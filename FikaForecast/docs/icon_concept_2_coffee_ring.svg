<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="bounds">
      <rect x="0" y="0" width="256" height="256"/>
    </clipPath>
    <filter id="stain-blur">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="stain-soft">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="trend-grad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#C67C4E"/>
      <stop offset="50%" stop-color="#4A9EFF"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="trend-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A9EFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4A9EFF" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#bounds)">

    <!-- All rings r=92, same cup, different placements & boldness -->

    <!-- ===== RING 1 — oldest, faintest, nudged up-left ===== -->
    <circle cx="118" cy="120" r="92"
            fill="none" stroke="#6B3F1F" stroke-width="18" opacity="0.08"
            filter="url(#stain-blur)"/>
    <circle cx="118" cy="120" r="92"
            fill="none" stroke="#8B5028" stroke-width="10" opacity="0.14"
            filter="url(#stain-soft)"/>
    <circle cx="118" cy="120" r="92"
            fill="none" stroke="#A0612B" stroke-width="4" opacity="0.22"/>

    <!-- ===== RING 2 — nudged down-right ===== -->
    <circle cx="140" cy="138" r="92"
            fill="none" stroke="#6B3F1F" stroke-width="22" opacity="0.09"
            filter="url(#stain-blur)"/>
    <circle cx="140" cy="138" r="92"
            fill="none" stroke="#8B5028" stroke-width="13" opacity="0.18"
            filter="url(#stain-soft)"/>
    <circle cx="140" cy="138" r="92"
            fill="none" stroke="#A0612B" stroke-width="6" opacity="0.3"/>

    <!-- ===== RING 3 — nudged right ===== -->
    <circle cx="136" cy="125" r="92"
            fill="none" stroke="#6B3F1F" stroke-width="20" opacity="0.08"
            filter="url(#stain-blur)"/>
    <circle cx="136" cy="125" r="92"
            fill="none" stroke="#8B5028" stroke-width="11" opacity="0.16"
            filter="url(#stain-soft)"/>
    <circle cx="136" cy="125" r="92"
            fill="none" stroke="#A0612B" stroke-width="5" opacity="0.26"/>

    <!-- ===== RING 4 — nudged down-left ===== -->
    <circle cx="122" cy="135" r="92"
            fill="none" stroke="#6B3F1F" stroke-width="24" opacity="0.1"
            filter="url(#stain-blur)"/>
    <circle cx="122" cy="135" r="92"
            fill="none" stroke="#8B5028" stroke-width="14" opacity="0.2"
            filter="url(#stain-soft)"/>
    <circle cx="122" cy="135" r="92"
            fill="none" stroke="#A0612B" stroke-width="7" opacity="0.32"/>

    <!-- ===== RING 5 — freshest, boldest, centered ===== -->
    <circle cx="128" cy="128" r="92"
            fill="none" stroke="#6B3F1F" stroke-width="30" opacity="0.12"
            filter="url(#stain-blur)"/>
    <circle cx="128" cy="128" r="92"
            fill="none" stroke="#8B5028" stroke-width="18" opacity="0.25"
            filter="url(#stain-soft)"/>
    <circle cx="128" cy="128" r="92"
            fill="none" stroke="#A0612B" stroke-width="10" opacity="0.5"/>
    <!-- pooling on freshest ring -->
    <path d="M180,210 C205,196 220,170 222,142"
          fill="none" stroke="#9B5B30" stroke-width="12" opacity="0.3"
          stroke-linecap="round" filter="url(#stain-soft)"/>
    <path d="M40,105 C45,72 68,48 98,38"
          fill="none" stroke="#9B5B30" stroke-width="10" opacity="0.22"
          stroke-linecap="round" filter="url(#stain-soft)"/>

  </g>

  <!-- ===== BAR CHART ===== -->
  <rect x="58" y="152" width="30" height="48" rx="4" fill="#C67C4E" opacity="0.85"/>
  <rect x="96" y="122" width="30" height="78" rx="4" fill="#9A7A60"/>
  <rect x="134" y="137" width="30" height="63" rx="4" fill="#7A8A90"/>
  <rect x="172" y="88" width="30" height="112" rx="4" fill="#4A9EFF"/>

  <!-- ===== TREND LINE ===== -->
  <path d="M73,147 L111,117 L149,130 L187,82 L187,200 L73,200 Z"
        fill="url(#trend-fill)"/>
  <polyline points="73,147 111,117 149,130 187,82"
           fill="none" stroke="#4A9EFF" stroke-width="14"
           stroke-linecap="round" stroke-linejoin="round" opacity="0.2"
           filter="url(#stain-soft)"/>
  <polyline points="73,147 111,117 149,130 187,82"
           fill="none" stroke="url(#trend-grad)" stroke-width="7"
           stroke-linecap="round" stroke-linejoin="round"
           filter="url(#glow)"/>
  <polygon points="192,74 176,90 184,84 178,98" fill="#2DD4BF"/>
</svg>